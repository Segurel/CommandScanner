<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3350;
    --accent: #00e5a0;
    --accent2: #0090ff;
    --warn: #ff6b35;
    --text: #e8eaf0;
    --muted: #6b7494;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: 
      linear-gradient(rgba(0,229,160,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,160,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  header {
    position: relative;
    z-index: 10;
    padding: 20px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(15,17,23,0.95);
    backdrop-filter: blur(10px);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-img-wrap {
    height: 44px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
  }

  .logo-img {
    height: 44px;
    width: auto;
    object-fit: contain;
    mix-blend-mode: screen;
  }

  .logo h1 {
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text);
  }

  .logo span {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.08em;
    display: block;
  }

  .header-status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
  }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  main {
    position: relative;
    z-index: 1;
    flex: 1;
    display: flex;
    flex-direction: column;
    max-width: 860px;
    margin: 0 auto;
    width: 100%;
    padding: 20px 16px;
    gap: 16px;
  }

  /* LEFT PANEL */
  .left-panel {
    display: contents;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }

  .card-header {
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface2);
  }

  .card-title {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .card-body { padding: 18px; }

  .field-group { margin-bottom: 14px; }
  .field-group:last-child { margin-bottom: 0; }

  label {
    display: block;
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }

  input[type="text"], input[type="date"], input[type="number"] {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 12px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }

  input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(0,229,160,0.12);
  }

  /* SCANNER INPUT */
  .scan-zone {
    position: relative;
  }

  #scan-input {
    width: 100%;
    background: var(--bg);
    border: 2px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px 14px 44px;
    color: var(--accent);
    font-family: var(--mono);
    font-size: 15px;
    font-weight: 600;
    outline: none;
    letter-spacing: 0.05em;
    transition: border-color 0.15s, box-shadow 0.15s;
  }

  #scan-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 4px rgba(0,229,160,0.15), 0 0 20px rgba(0,229,160,0.08);
  }

  #scan-input::placeholder { color: var(--muted); font-weight: 400; }

  .scan-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    pointer-events: none;
    transition: color 0.15s;
  }

  #scan-input:focus ~ .scan-icon { color: var(--accent); }

  .scan-flash {
    animation: flash 0.3s ease;
  }

  @keyframes flash {
    0% { background: rgba(0,229,160,0.2); border-color: var(--accent); }
    100% { background: var(--bg); }
  }

  /* QTY ROW */
  .qty-row {
    display: flex;
    gap: 10px;
    margin-top: 12px;
  }

  .qty-row input {
    width: 90px;
    flex-shrink: 0;
    text-align: center;
    font-size: 16px;
    font-weight: 700;
  }

  .btn {
    flex: 1;
    padding: 10px 16px;
    border: none;
    border-radius: 6px;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  .btn-primary {
    background: var(--accent);
    color: #0f1117;
  }
  .btn-primary:hover { background: #00ffb3; transform: translateY(-1px); }
  .btn-primary:active { transform: translateY(0); }

  .btn-secondary {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover { background: var(--border); }

  .btn-danger {
    background: rgba(255,107,53,0.15);
    color: var(--warn);
    border: 1px solid rgba(255,107,53,0.3);
  }
  .btn-danger:hover { background: rgba(255,107,53,0.25); }

  .btn-export {
    background: var(--accent2);
    color: white;
    padding: 13px 20px;
    font-size: 13px;
  }
  .btn-export:hover { background: #3aa8ff; transform: translateY(-1px); }


  /* MODE TABS */
  .mode-tabs {
    display: flex;
    gap: 4px;
    padding: 4px;
    background: var(--bg);
    border-radius: 8px;
    border: 1px solid var(--border);
  }

  .mode-tab {
    flex: 1;
    padding: 8px;
    border: none;
    border-radius: 5px;
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    background: transparent;
    color: var(--muted);
    transition: all 0.15s;
  }

  .mode-tab.active {
    background: var(--surface2);
    color: var(--accent);
    border: 1px solid var(--border);
  }

  /* STATS BAR */
  .stats-bar {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1px;
    background: var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  .stat {
    background: var(--surface);
    padding: 12px 14px;
    text-align: center;
  }

  .stat-value {
    font-family: var(--mono);
    font-size: 22px;
    font-weight: 700;
    color: var(--accent);
    line-height: 1;
  }

  .stat-label {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 4px;
  }

  /* PASTE ZONE */
  #paste-zone {
    width: 100%;
    min-height: 120px;
    background: var(--bg);
    border: 2px dashed var(--border);
    border-radius: 8px;
    padding: 12px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    resize: vertical;
    outline: none;
    transition: border-color 0.15s;
  }

  #paste-zone:focus {
    border-color: var(--accent2);
    box-shadow: 0 0 0 3px rgba(0,144,255,0.12);
  }

  /* TABLE WRAP */
  .table-wrap {
    overflow: auto;
    border-radius: 10px;
    border: 1px solid var(--border);
    max-height: 420px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-family: var(--mono);
    font-size: 13px;
  }

  thead {
    position: sticky;
    top: 0;
    z-index: 5;
  }

  thead th {
    background: var(--surface2);
    padding: 12px 16px;
    text-align: left;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }

  thead th:first-child { border-radius: 10px 0 0 0; }
  thead th:last-child { border-radius: 0 10px 0 0; text-align: center; }

  tbody tr {
    border-bottom: 1px solid rgba(46,51,80,0.5);
    transition: background 0.1s;
  }

  tbody tr:hover { background: rgba(0,229,160,0.04); }

  tbody tr:last-child { border-bottom: none; }

  tbody tr.new-row {
    animation: rowIn 0.3s ease;
  }

  @keyframes rowIn {
    from { background: rgba(0,229,160,0.15); transform: translateX(-4px); opacity: 0.5; }
    to { background: transparent; transform: translateX(0); opacity: 1; }
  }

  td {
    padding: 10px 16px;
    vertical-align: middle;
  }

  .td-num {
    color: var(--muted);
    font-size: 11px;
    width: 40px;
  }

  .td-code {
    color: var(--text);
    font-weight: 600;
    letter-spacing: 0.05em;
  }

  .td-qty {
    width: 100px;
  }

  .qty-edit {
    background: var(--surface2);
    border: 1px solid transparent;
    border-radius: 4px;
    padding: 4px 8px;
    color: var(--accent);
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 700;
    width: 60px;
    text-align: center;
    outline: none;
    transition: all 0.15s;
  }

  .qty-edit:focus {
    border-color: var(--accent);
    background: var(--bg);
  }

  .td-delete { text-align: center; width: 50px; }

  .btn-del {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    padding: 4px;
    border-radius: 4px;
    transition: all 0.15s;
    line-height: 1;
  }
  .btn-del:hover { color: var(--warn); background: rgba(255,107,53,0.12); }

  .empty-state {
    padding: 60px 20px;
    text-align: center;
    color: var(--muted);
  }

  .empty-icon {
    font-size: 48px;
    margin-bottom: 12px;
    opacity: 0.3;
  }

  .empty-title {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 6px;
    color: var(--muted);
  }

  .empty-sub {
    font-size: 12px;
    color: var(--muted);
    opacity: 0.6;
  }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%) translateY(10px);
    z-index: 100;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    border-radius: 8px;
    padding: 12px 18px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text);
    opacity: 0;
    transition: all 0.25s;
    pointer-events: none;
    max-width: 320px;
    white-space: nowrap;
  }

  .toast.show {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
  }

  .toast.warn { border-left-color: var(--warn); }

  /* EXPORT BAR */
  .export-bar {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .export-bar .btn-export,
  .export-bar .btn-danger { flex: 1; padding: 13px 20px; font-size: 13px; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

  @media (max-width: 900px) {
    main { padding: 12px 8px; }
    .table-wrap { max-height: 400px; }
  }
</style>
</head>

          <input type="text" id="scan-input" placeholder="Scannez ou tapez un code barre…" autocomplete="off" autofocus />
          <div class="scan-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="2" height="14"/><rect x="7" y="4" width="1" height="14"/><rect x="10" y="4" width="2" height="14"/><rect x="14" y="4" width="1" height="14"/><rect x="17" y="4" width="2" height="14"/></svg>
          </div>
        </div>
        <div style="margin-top:10px">
          <button class="btn btn-secondary" style="width:100%" onclick="addManual()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Ajouter
          </button>
        </div>

      </div>
    </div>

    <!-- Articles scannés -->
    <div class="card">
      <div class="card-header">
        <div class="card-title">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
          Articles scannés
        </div>
        <div style="font-family:var(--mono);font-size:11px;color:var(--muted)" id="table-info">—</div>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Code barre</th>
              <th>Quantité</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="table-body">
            <tr id="empty-row">
              <td colspan="4">
                <div class="empty-state">
                  <div class="empty-icon">▊▌▌▎▊</div>
                  <div class="empty-title">Aucun article scanné</div>
                  <div class="empty-sub">Scannez un code barre</div>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Actions -->
    <div class="card">
      <div class="card-header">
        <div class="card-title">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="8 17 12 21 16 17"/><line x1="12" y1="21" x2="12" y2="9"/><path d="M20.88 18.09A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.29"/></svg>
          Export
        </div>
      </div>
      <div class="card-body">
        <div class="export-bar">
          <button class="btn btn-export" onclick="exportXLS()">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
            Exporter CSV
          </button>
          <button class="btn btn-danger" onclick="clearAll()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
            Vider
          </button>
        </div>
      </div>
    </div>

  </div>

</main>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ── State ──────────────────────────────────────────────
const items = [];

// Set default date to J+2
const j2 = new Date();
j2.setDate(j2.getDate() + 2);
document.getElementById('field-delai').valueAsDate = j2;

// ── Mode ───────────────────────────────────────────────

// ── Code validation ────────────────────────────────────
function validateCode(input) {
  input.value = input.value.replace(/\D/g, '').slice(0, 6);
  const err = document.getElementById('code-error');
  const valid = input.value.length === 6;
  err.style.display = (!valid && input.value.length > 0) ? '' : 'none';
  input.style.borderColor = (!valid && input.value.length > 0) ? 'var(--warn)' : '';
}

// ── Scan input ─────────────────────────────────────────
const scanInput = document.getElementById('scan-input');

// ── Scan code validation ───────────────────────────────
function isValidScanCode(code) {
  return /^\d{6}$/.test(code) || /^\d{13}$/.test(code);
}

function getCodeType(code) {
  if (/^\d{13}$/.test(code)) return 'EAN-13';
  if (/^\d{6}$/.test(code)) return 'Code interne';
  return null;
}

scanInput.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const code = this.value.trim();
    if (!code) return;
    if (!isValidScanCode(code)) {
      toast(`Code invalide — EAN-13 (13 chiffres) ou code interne (6 chiffres) requis`, true);
      this.classList.add('scan-flash');
      setTimeout(() => this.classList.remove('scan-flash'), 300);
      this.select();
      return;
    }
    addItem(code, 1);
    this.value = '';
    this.classList.add('scan-flash');
    setTimeout(() => this.classList.remove('scan-flash'), 300);
  }
});

// Auto-focus on scan input — permanent, revient toujours après clic dans le vide
document.addEventListener('keydown', function(e) {
  const tag = document.activeElement.tagName;
  if (tag === 'INPUT' || tag === 'TEXTAREA') return;
  scanInput.focus();
});

document.addEventListener('click', function(e) {
  // Si le clic n'est pas sur un input, textarea, button ou select → refocus scan
  const tag = e.target.tagName;
  if (!['INPUT', 'TEXTAREA', 'BUTTON', 'SELECT', 'LABEL'].includes(tag)) {
    setTimeout(() => scanInput.focus(), 50);
  }
});

document.addEventListener('focusout', function(e) {
  // Revenir sur scanInput seulement si le focus va nulle part (clic dans le vide)
  setTimeout(() => {
    const active = document.activeElement;
    // Si le focus est sur body ou html → rien n'est sélectionné, revenir sur scan
    if (!active || active === document.body || active === document.documentElement) {
      scanInput.focus();
    }
  }, 150);
});

function addManual() {
  const code = scanInput.value.trim();
  if (!code) { toast('Saisissez un code barre', true); return; }
  if (!isValidScanCode(code)) {
    toast('Code invalide — EAN-13 (13 chiffres) ou code interne (6 chiffres) requis', true);
    scanInput.select();
    return;
  }
  addItem(code, 1);
  scanInput.value = '';
  scanInput.focus();
}

// ── Core add ───────────────────────────────────────────
function addItem(code, qty) {
  const existing = items.findIndex(i => i.code === code);
  if (existing >= 0) {
    items[existing].qty += qty;
    updateRow(existing);
    toast(`Code ${code} → +${qty} (total: ${items[existing].qty})`);
  } else {
    items.push({ code, qty });
    renderRow(items.length - 1, true);
    toast(`✓ ${code}  ×${qty} — ${getCodeType(code)}`);
  }
  updateStats();
}

// ── Paste import ───────────────────────────────────────
function parsePaste() {
  const raw = document.getElementById('paste-zone').value.trim();
  if (!raw) return;
  const lines = raw.split(/\r?\n/);
  let added = 0, errors = 0;
  lines.forEach(line => {
    line = line.trim();
    if (!line) return;
    const parts = line.split(/[\s;,\t]+/);
    const code = parts[0];
    const qty = parts.length > 1 ? parseInt(parts[1]) : 1;
    if (!code) { errors++; return; }
    if (isNaN(qty) || qty < 1) { errors++; return; }
    if (!isValidScanCode(code)) { errors++; return; }
    addItem(code, qty);
    added++;
  });
  toast(`${added} article(s) importé(s)${errors ? ` — ${errors} erreur(s)` : ''}`);
}

// ── Render ─────────────────────────────────────────────
function renderRow(idx, isNew) {
  const emptyRow = document.getElementById('empty-row');
  if (emptyRow) emptyRow.remove();

  const tbody = document.getElementById('table-body');
  const tr = document.createElement('tr');
  tr.id = 'row-' + idx;
  if (isNew) tr.classList.add('new-row');
  tr.innerHTML = rowHTML(idx);
  tbody.appendChild(tr);
  updateTableInfo();
}

function rowHTML(idx) {
  const item = items[idx];
  return `
    <td class="td-num">${idx + 1}</td>
    <td class="td-code">${escapeHtml(item.code)}</td>
    <td class="td-qty">
      <input class="qty-edit" type="number" value="${item.qty}" min="1" 
        onchange="changeQty(${idx}, this.value)"
        onfocus="this.select()"
      />
    </td>
    <td class="td-delete">
      <button class="btn-del" onclick="deleteRow(${idx})" title="Supprimer">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </td>`;
}

function updateRow(idx) {
  const tr = document.getElementById('row-' + idx);
  if (tr) tr.innerHTML = rowHTML(idx);
}

function rebuildTable() {
  const tbody = document.getElementById('table-body');
  tbody.innerHTML = '';
  if (items.length === 0) {
    tbody.innerHTML = `<tr id="empty-row"><td colspan="4"><div class="empty-state">
      <div class="empty-icon">▊▌▌▎▊</div>
      <div class="empty-title">Aucun article scanné</div>
      <div class="empty-sub">Scannez un code barre</div>
    </div></td></tr>`;
  } else {
    items.forEach((_, i) => {
      const tr = document.createElement('tr');
      tr.id = 'row-' + i;
      tr.innerHTML = rowHTML(i);
      tbody.appendChild(tr);
    });
  }
  updateTableInfo();
}

function updateTableInfo() {
  const el = document.getElementById('table-info');
  el.textContent = items.length ? `${items.length} référence(s)` : '—';
}

function changeQty(idx, val) {
  const n = parseInt(val);
  if (n < 1 || isNaN(n)) { updateRow(idx); return; }
  items[idx].qty = n;
  updateStats();
}

function deleteRow(idx) {
  items.splice(idx, 1);
  rebuildTable();
  updateStats();
  toast('Ligne supprimée', true);
}

function clearAll() {
  if (items.length === 0) { toast('Aucun article à supprimer', true); return; }
  // confirm() est bloqué en mode PWA standalone sur iOS — on utilise un double-tap
  if (!clearAll._pending) {
    clearAll._pending = true;
    toast(`Appuyez à nouveau pour vider les ${items.length} ligne(s)`, true);
    setTimeout(() => { clearAll._pending = false; }, 3000);
    return;
  }
  clearAll._pending = false;
  items.length = 0;
  rebuildTable();
  updateStats();
  toast('Liste vidée');
}

// ── Stats ──────────────────────────────────────────────
function updateStats() {
  document.getElementById('stat-lines').textContent = items.length;
  document.getElementById('stat-qty').textContent = items.reduce((s, i) => s + i.qty, 0);
}

// ── Export XLS ─────────────────────────────────────────
function exportXLS() {
  const code = document.getElementById('field-code').value.trim();
  const delaiRaw = document.getElementById('field-delai').value;
  const type = document.getElementById('field-type').value.trim() || 'COMMANDE';

  if (!code || !/^\d{6}$/.test(code)) {
    toast('Code client : 6 chiffres requis', true);
    document.getElementById('field-code').focus();
    return;
  }
  if (items.length === 0) { toast('Aucun article à exporter', true); return; }

  // Format date as DD/MM/YYYY
  let delai = '';
  if (delaiRaw) {
    const d = new Date(delaiRaw);
    const jj = String(d.getDate()).padStart(2,'0');
    const mm = String(d.getMonth()+1).padStart(2,'0');
    const aa = String(d.getFullYear()).slice(-2);
    delai = `${jj}/${mm}/${d.getFullYear()}`;
  }

  // Build XLS (BIFF2 format — simple, opens in Excel/LibreOffice)
  // We'll use a CSV-style approach wrapped as XLS-compatible
  // Actually build proper .xls via HTML table trick
  let rows = [
    ['CODE', code],
    ['DELAI', delai],
    ['TYPE', type],
  ];
  items.forEach(item => rows.push([item.code, item.qty]));

  // Build tab-separated content with .xls extension (recognized by Excel)
  const tsv = rows.map(r => r.join(';')).join('\r\n');
  const BOM = '\uFEFF';
  const blob = new Blob([BOM + tsv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;

  const today = new Date().toISOString().slice(0,10).replace(/-/g,'');
  a.download = `COMMANDE_${code}_${today}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  toast(`✓ Fichier exporté — ${items.length} lignes`);
}

// ── Toast ──────────────────────────────────────────────
let toastTimer;
function toast(msg, warn=false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (warn ? ' warn' : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2400);
}

// ── Escape ─────────────────────────────────────────────
function escapeHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Init ───────────────────────────────────────────────
scanInput.focus();

// ── PWA Service Worker (inline) ────────────────────────
if ('serviceWorker' in navigator) {
  const swCode = `
    const CACHE = 'segurel-scan-v1';

    self.addEventListener('install', e => {
      e.waitUntil(
        caches.open(CACHE).then(cache =>
          fetch(self.location.href)
            .then(res => cache.put(self.location.href, res))
            .catch(() => {})
        )
      );
      self.skipWaiting();
    });

    self.addEventListener('activate', e => {
      e.waitUntil(
        caches.keys().then(keys =>
          Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))
        )
      );
      self.clients.claim();
    });

    self.addEventListener('fetch', e => {
      if (e.request.mode === 'navigate') {
        e.respondWith(
          fetch(e.request).catch(() => caches.match(self.location.href))
        );
      }
    });
  `;

  const blob = new Blob([swCode], { type: 'application/javascript' });
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl, { scope: '/' })
    .then(reg => console.log('[PWA] SW enregistré'))
    .catch(err => console.log('[PWA] SW (local):', err.message));
}

// ── PWA Manifest inline ────────────────────────────────
(function() {
  const iconHref = document.querySelector('link[rel="apple-touch-icon"]').href;
  const manifest = {
    name: "Segurel — Scan & Commande",
    short_name: "Segurel",
    description: "Saisie de commandes par scan de codes-barres",
    start_url: ".",
    display: "standalone",
    background_color: "#0f1117",
    theme_color: "#0f1117",
    orientation: "portrait-primary",
    icons: [
      { src: iconHref, sizes: "192x192", type: "image/png", purpose: "any maskable" },
      { src: iconHref, sizes: "512x512", type: "image/png", purpose: "any maskable" }
    ]
  };
  const mBlob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
  const link = document.createElement('link');
  link.rel = 'manifest';
  link.href = URL.createObjectURL(mBlob);
  document.head.appendChild(link);
})();

</script>
</body>
</html>
