
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <!-- iPhone-friendly viewport + safe area -->
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
  <title>Saisie Commande — Scanner (iPhone)</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <style>
    :root{
      --bg:#0f1117;--surface:#1a1d27;--surface2:#22263a;--border:#2e3350;--accent:#00e5a0;--accent2:#0090ff;--warn:#ff6b35;--text:#e8eaf0;--muted:#6b7494;--mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif;
      --safe-top: env(safe-area-inset-top);--safe-bottom: env(safe-area-inset-bottom);--safe-left: env(safe-area-inset-left);--safe-right: env(safe-area-inset-right);
    }
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color: transparent;}
    html,body{height:100%;}
    body{
      background:var(--bg);color:var(--text);font-family:var(--sans);
      min-height:100dvh; /* iOS 15+ dynamic vh */
      display:flex;flex-direction:column;
      padding-left: max(0px, var(--safe-left));
      padding-right: max(0px, var(--safe-right));
    }
    body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,229,160,.03) 1px,transparent 1px),linear-gradient(90deg, rgba(0,229,160,.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
    header{position:sticky;top:0;z-index:10;padding:12px 16px calc(12px + var(--safe-top));border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:rgba(15,17,23,.95);backdrop-filter:blur(10px)}
    .logo{display:flex;align-items:center;gap:10px}
    .logo-icon{width:32px;height:32px;background:var(--accent);border-radius:6px;display:grid;place-items:center;flex-shrink:0}
    .logo-icon svg{width:18px;height:18px}
    .logo h1{font-family:var(--mono);font-size:13px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--text)}
    .logo span{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:.08em;display:block}
    .header-status{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:12px;color:var(--muted)}
    .status-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent);animation:pulse 2s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

    main{position:relative;z-index:1;flex:1;display:grid;grid-template-columns:1fr;max-width:900px;margin:0 auto;width:100%;padding:16px;gap:16px}
    @media (min-width:920px){ main{grid-template-columns:340px 1fr;gap:24px;padding:28px} }

    .card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden}
    .card-header{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--surface2)}
    .card-title{font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);display:flex;align-items:center;gap:8px}
    .card-body{padding:14px}

    label{display:block;font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
    input[type="text"],input[type="date"],input[type="number"],textarea{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:14px 14px;color:var(--text);font-family:var(--mono);font-size:16px; /* >=16px to prevent zoom */ outline:none;transition:border-color .15s, box-shadow .15s}
    input:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,229,160,.12)}

    .scan-zone{position:relative}
    #scan-input{padding-left:44px;color:var(--accent);font-weight:700;letter-spacing:.05em}
    .scan-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none;transition:color .15s}
    #scan-input:focus ~ .scan-icon{color:var(--accent)}
    .scan-flash{animation:flash .3s ease}
    @keyframes flash{0%{background:rgba(0,229,160,.2);border-color:var(--accent)}100%{background:var(--bg)}}

    .btn{padding:14px 16px;border:none;border-radius:10px;font-family:var(--mono);font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px}
    .btn-primary{background:var(--accent);color:#0f1117}
    .btn-primary:active{transform:scale(.98)}
    .btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
    .btn-danger{background:rgba(255,107,53,.15);color:var(--warn);border:1px solid rgba(255,107,53,.3)}
    .btn-export{background:var(--accent2);color:#fff}

    .left-panel,.right-panel{display:flex;flex-direction:column;gap:12px}

    .stats-bar{display:grid;grid-template-columns:repeat(2,1fr);gap:1px;background:var(--border);border-radius:10px;overflow:hidden}
    .stat{background:var(--surface);padding:12px 14px;text-align:center}
    .stat-value{font-family:var(--mono);font-size:22px;font-weight:700;color:var(--accent);line-height:1}
    .stat-label{font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-top:4px}

    .table-wrap{flex:1;overflow:auto;border-radius:10px;border:1px solid var(--border);max-height:40vh}
    @media (min-width:920px){ .table-wrap{max-height:calc(100vh - 220px)} }
    table{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:14px}
    thead{position:sticky;top:0;z-index:5}
    thead th{background:var(--surface2);padding:12px 16px;text-align:left;font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border);white-space:nowrap}
    tbody tr{border-bottom:1px solid rgba(46,51,80,.5);transition:background .1s}
    td{padding:10px 16px;vertical-align:middle}
    .td-num{color:var(--muted);font-size:11px;width:40px}
    .qty-edit{background:var(--surface2);border:1px solid transparent;border-radius:8px;padding:8px;color:var(--accent);font-family:var(--mono);font-size:16px;font-weight:700;width:80px;text-align:center;outline:none}

    /* Sticky action bar on iPhone */
    .action-footer{position:sticky;bottom:0;z-index:10;padding:12px 16px calc(12px + var(--safe-bottom));background:rgba(15,17,23,.85);backdrop-filter:blur(8px);border-top:1px solid var(--border);display:flex;gap:10px}
    .action-footer .btn{flex:1}

    /* Toast */
    .toast{position:fixed;bottom:calc(16px + var(--safe-bottom));right:16px;left:16px;z-index:100;background:var(--surface2);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:10px;padding:12px 18px;font-family:var(--mono);font-size:12px;color:var(--text);transform:translateY(20px);opacity:0;transition:all .25s;pointer-events:none;max-width:680px;margin:0 auto}
    .toast.show{transform:translateY(0);opacity:1}
    .toast.warn{border-left-color:var(--warn)}
  </style>
</head>
<body>
  <header>
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#0f1117" stroke-width="2.5" stroke-linecap="round"><rect x="3" y="4" width="3" height="14"/><rect x="8" y="4" width="1.5" height="14"/><rect x="11" y="4" width="3" height="14"/><rect x="16" y="4" width="1.5" height="14"/><rect x="19" y="4" width="2" height="14"/><line x1="3" y1="21" x2="21" y2="21"/></svg>
      </div>
      <div>
        <h1>Scan & Commande</h1>
        <span>Optimisée iPhone</span>
      </div>
    </div>
    <div class="header-status"><div class="status-dot"></div><span id="status-text">Prêt</span></div>
  </header>

  <main>
    <div class="left-panel">
      <div class="stats-bar" style="grid-template-columns:repeat(2,1fr)">
        <div class="stat"><div class="stat-value" id="stat-lines">0</div><div class="stat-label">Lignes</div></div>
        <div class="stat"><div class="stat-value" id="stat-qty">0</div><div class="stat-label">Quantité</div></div>
      </div>

      <div class="card">
        <div class="card-header"><div class="card-title">En‑tête commande</div></div>
        <div class="card-body">
          <label>Code client / fournisseur <span style="color:var(--warn)">*</span></label>
          <input type="text" id="field-code" placeholder="6 chiffres requis" maxlength="6" pattern="\d{6}" inputmode="numeric" autocomplete="one-time-code">
          <div id="code-error" style="font-family:var(--mono);font-size:10px;color:var(--warn);margin-top:4px;display:none">⚠ 6 chiffres requis</div>
          <div style="height:10px"></div>
          <label>Délai de livraison</label>
          <input type="date" id="field-delai">
          <div style="height:10px"></div>
          <label>Type</label>
          <input type="text" id="field-type" value="COMMANDE" readonly style="color:var(--muted);opacity:.7">
        </div>
      </div>

      <div class="card">
        <div class="card-header"><div class="card-title">Saisie scanner</div></div>
        <div class="card-body">
          <div class="scan-zone">
            <input type="text" id="scan-input" placeholder="Scannez ou tapez un code barre…" autocomplete="off" autofocus inputmode="decimal">
            <div class="scan-icon">🧾</div>
          </div>
          <div style="display:flex; gap:8px; margin-top:10px">
            <button class="btn btn-secondary" style="flex:1" id="btn-add">Ajouter</button>
            <button class="btn btn-primary" style="flex:1" id="btn-camera">Scanner avec l’appareil photo</button>
          </div>
          <small style="display:block;color:var(--muted);margin-top:8px">Astuce : branchez un lecteur code‑barres Bluetooth en mode clavier pour une saisie ultra‑rapide.</small>
        </div>
      </div>

      <div class="card">
        <div class="card-header"><div class="card-title">Export</div></div>
        <div class="card-body">
          <div style="display:flex;gap:10px">
            <button class="btn btn-export" id="btn-export">Exporter CSV</button>
            <button class="btn btn-danger" id="btn-clear">Vider</button>
          </div>
        </div>
      </div>
    </div>

    <div class="right-panel">
      <div class="card" style="flex:1;display:flex;flex-direction:column">
        <div class="card-header">
          <div class="card-title">Articles scannés</div>
          <div style="font-family:var(--mono);font-size:11px;color:var(--muted)" id="table-info">—</div>
        </div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>#</th><th>Code barre</th><th>Quantité</th><th></th></tr></thead>
            <tbody id="table-body"><tr id="empty-row"><td colspan="4" style="text-align:center;color:var(--muted);padding:28px">Aucun article</td></tr></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <div class="action-footer">
    <button class="btn btn-export" id="btn-export-footer">Exporter</button>
    <button class="btn btn-secondary" id="btn-focus">Focus saisie</button>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    // --- State
    const items = [];
    const j2 = new Date(); j2.setDate(j2.getDate()+2); document.getElementById('field-delai').valueAsDate = j2;

    // --- Elements
    const scanInput = document.getElementById('scan-input');
    const toastEl = document.getElementById('toast');

    // --- Code validation
    function validateCode(input){
      input.value = input.value.replace(/\D/g,'').slice(0,6);
      const err=document.getElementById('code-error');
      const valid = input.value.length===6;
      err.style.display = (!valid && input.value.length>0)?'':'none';
      input.style.borderColor = (!valid && input.value.length>0)?'var(--warn)':'';
    }
    document.getElementById('field-code').addEventListener('input', e=>validateCode(e.target));

    // --- Scan input (Enter or Add button)
    scanInput.addEventListener('keydown', e=>{ if(e.key==='Enter'){ const c=scanInput.value.trim(); if(!c) return; addItem(c,1); scanInput.value=''; flash(scanInput); } });
    document.getElementById('btn-add').addEventListener('click',()=>{ const c=scanInput.value.trim(); if(!c){ toast('Saisissez un code barre', true); return;} addItem(c,1); scanInput.value=''; scanInput.focus(); });

    // --- Keep focus (dedicated button for iOS)
    document.getElementById('btn-focus').addEventListener('click',()=>{ scanInput.focus(); });

    // --- Keyboard focus on typing (avoid stealing focus from other inputs)
    document.addEventListener('keydown', (e)=>{
      const tag = document.activeElement.tagName;
      if(tag==='INPUT' || tag==='TEXTAREA') return;
      scanInput.focus();
    });

    function flash(el){ el.classList.add('scan-flash'); setTimeout(()=>el.classList.remove('scan-flash'),300); }

    // --- Core add
    function addItem(code, qty){
      const i = items.findIndex(x=>x.code===code);
      if(i>=0){ items[i].qty += qty; updateRow(i); toast(`Code ${code} → +${qty} (total: ${items[i].qty})`); }
      else { items.push({code, qty}); renderRow(items.length-1, true); toast(`✓ ${code} ×${qty}`); }
      updateStats();
      try { window.navigator.vibrate?.([10]); } catch(e){}
    }

    // --- Table helpers
    function rowHTML(idx){ const it=items[idx]; return `
      <td class="td-num">${idx+1}</td>
      <td class="td-code">${escapeHtml(it.code)}</td>
      <td class="td-qty"><input class="qty-edit" type="number" value="${it.qty}" min="1" onchange="changeQty(${idx}, this.value)" onfocus="this.select()"></td>
      <td class="td-delete"><button class="btn" style="padding:6px 8px" onclick="deleteRow(${idx})" title="Supprimer">✕</button></td>`; }
    function renderRow(idx,isNew){ const empty=document.getElementById('empty-row'); if(empty) empty.remove(); const tb=document.getElementById('table-body'); const tr=document.createElement('tr'); tr.id='row-'+idx; if(isNew) tr.classList.add('new-row'); tr.innerHTML=rowHTML(idx); tb.appendChild(tr); updateTableInfo(); }
    function updateRow(idx){ const tr=document.getElementById('row-'+idx); if(tr) tr.innerHTML=rowHTML(idx); }
    function rebuildTable(){ const tb=document.getElementById('table-body'); tb.innerHTML=''; if(items.length===0){ tb.innerHTML='<tr id="empty-row"><td colspan="4" style="text-align:center;color:var(--muted);padding:28px">Aucun article</td></tr>'; } else { items.forEach((_,i)=>{ const tr=document.createElement('tr'); tr.id='row-'+i; tr.innerHTML=rowHTML(i); tb.appendChild(tr); }); } updateTableInfo(); }
    function updateTableInfo(){ document.getElementById('table-info').textContent = items.length ? `${items.length} référence(s)` : '—'; }
    function changeQty(idx,val){ const n=parseInt(val); if(n<1||isNaN(n)){ updateRow(idx); return;} items[idx].qty=n; updateStats(); }
    function deleteRow(idx){ items.splice(idx,1); rebuildTable(); updateStats(); toast('Ligne supprimée', true); }

    function updateStats(){ document.getElementById('stat-lines').textContent=items.length; document.getElementById('stat-qty').textContent=items.reduce((s,i)=>s+i.qty,0); }

    // --- Export (iOS friendly: try Web Share, else download, else open new tab)
    async function exportCSV(){
      const code = document.getElementById('field-code').value.trim();
      const delaiRaw = document.getElementById('field-delai').value;
      const type = (document.getElementById('field-type').value || 'COMMANDE').trim();
      if(!/^\d{6}$/.test(code)){ toast('Code client : 6 chiffres requis', true); document.getElementById('field-code').focus(); return; }
      if(items.length===0){ toast('Aucun article à exporter', true); return; }
      let delai='';
      if(delaiRaw){ const d=new Date(delaiRaw); const jj=String(d.getDate()).padStart(2,'0'); const mm=String(d.getMonth()+1).padStart(2,'0'); delai=`${jj}/${mm}/${d.getFullYear()}`; }
      const rows = [ ['CODE', code], ['DELAI', delai], ['TYPE', type], ...items.map(it=>[it.code, it.qty]) ];
      const csv = '﻿' + rows.map(r=>r.join(';')).join('
');
      const today = new Date().toISOString().slice(0,10).replace(/-/g,'');
      const fileName = `COMMANDE_${code}_${today}.csv`;
      try {
        const blob = new Blob([csv], {type:'text/csv;charset=utf-8'});
        if(navigator.canShare && navigator.canShare({ files: [new File([blob], fileName, {type:'text/csv'})] })){
          await navigator.share({ files:[ new File([blob], fileName, {type:'text/csv'}) ], title:'Export commande', text:fileName });
        } else {
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a'); a.href=url; a.download=fileName; a.rel='noopener'; a.click(); setTimeout(()=>URL.revokeObjectURL(url), 2000);
        }
        toast(`✓ Fichier exporté — ${items.length} lignes`);
      } catch(e){
        // Fallback: open in new tab (some old iOS)
        const encoded = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
        window.open(encoded, '_blank');
        toast('Fichier ouvert dans un nouvel onglet (fallback)');
      }
    }

    document.getElementById('btn-export').addEventListener('click', exportCSV);
    document.getElementById('btn-export-footer').addEventListener('click', exportCSV);
    document.getElementById('btn-clear').addEventListener('click', ()=>{ if(items.length===0) return; if(!confirm(`Vider les ${items.length} ligne(s) ?`)) return; items.length=0; rebuildTable(); updateStats(); });

    // --- Toast
    let toastTimer; function toast(msg, warn=false){ toastEl.textContent=msg; toastEl.className='toast show'+(warn?' warn':''); clearTimeout(toastTimer); toastTimer=setTimeout(()=>toastEl.classList.remove('show'), 2400); }
    function escapeHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    // --- Camera barcode (Safari 17+)
    async function startCameraScan(){
      if(!('BarcodeDetector' in window)) { toast("Lecteur natif indisponible sur cet iPhone", true); return; }
      const formats = ['ean_13','ean_8','code_128','code_39','upc_a','upc_e','itf'];
      const detector = new BarcodeDetector({ formats });
      let stream;
      try{
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode:'environment' } });
      }catch(e){ toast('Accès caméra refusé', true); return; }
      const video = document.createElement('video');
      video.playsInline = true; // no fullscreen iPhone
      video.srcObject = stream; await video.play();
      const overlay = document.createElement('div');
      Object.assign(overlay.style,{position:'fixed',inset:'0',background:'rgba(0,0,0,.6)',display:'grid',placeItems:'center',zIndex:9999});
      const frame = document.createElement('div'); Object.assign(frame.style,{position:'relative',width:'min(92vw,520px)',aspectRatio:'3/4',border:'2px solid var(--accent)',borderRadius:'12px',overflow:'hidden'});
      frame.appendChild(video); overlay.appendChild(frame); document.body.appendChild(overlay);
      let running=true;
      overlay.addEventListener('click',()=>{ running=false; cleanup(); });
      function cleanup(){ try{ stream.getTracks().forEach(t=>t.stop()); }catch{} overlay.remove(); }
      const loop = async()=>{
        if(!running) return; try{ const codes = await detector.detect(video); if(codes && codes.length){ const val = codes[0].rawValue || codes[0].value; addItem(String(val).trim(), 1); running=false; cleanup(); scanInput.focus(); return; } }catch{}
        requestAnimationFrame(loop);
      };
      loop();
    }
    document.getElementById('btn-camera').addEventListener('click', startCameraScan);

    // --- Init focus
    scanInput.focus();
  </script>
</body>
</html>
